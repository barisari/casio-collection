<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casio Collection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f2; --surf: #ffffff; --surf2: #f0efe9;
    --brd: rgba(0,0,0,0.08); --brd2: rgba(0,0,0,0.14);
    --tx: #111111; --mt: #777777; --ac: #1a1a1a; --ac-light: #f0f0ec;
    --solar: #c47600; --solar-bg: #fff7e6;
    --bt: #1a56cc; --bt-bg: #eef3ff;
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    --radius: 14px; --radius-sm: 8px;
  }
  [data-theme="dark"] {
    --bg: #0f0f0f; --surf: #1a1a1a; --surf2: #222222;
    --brd: rgba(255,255,255,0.07); --brd2: rgba(255,255,255,0.13);
    --tx: #efefef; --mt: #888888; --ac: #efefef; --ac-light: #2a2a2a;
    --solar: #ffaa44; --solar-bg: #2a1f00;
    --bt: #6699ff; --bt-bg: #0f1a33;
  }
  [data-theme="retro"] {
    --bg: #0c180c; --surf: #0f1f0f; --surf2: #0a160a;
    --brd: rgba(51,255,51,0.12); --brd2: rgba(51,255,51,0.25);
    --tx: #33ff33; --mt: #1d8a1d; --ac: #33ff33; --ac-light: rgba(51,255,51,0.1);
    --solar: #33ff33; --solar-bg: rgba(51,255,51,0.08);
    --bt: #33ff33; --bt-bg: rgba(51,255,51,0.08);
    --font: 'DM Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--tx); font-family: var(--font); font-size: 14px; transition: background 0.3s, color 0.3s; min-height: 100vh; }
  .topbar { position: sticky; top: 0; z-index: 100; background: var(--surf); border-bottom: 1px solid var(--brd); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .logo { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 3px; color: var(--tx); }
  [data-theme="retro"] .logo { text-shadow: 0 0 10px rgba(51,255,51,0.4); }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .seg { display: flex; border: 1px solid var(--brd2); border-radius: var(--radius-sm); overflow: hidden; }
  .seg button { padding: 5px 12px; background: transparent; border: none; border-right: 1px solid var(--brd2); color: var(--mt); font-size: 11px; font-family: var(--font); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--ac); color: var(--bg); }
  .seg button:hover:not(.on) { background: var(--surf2); color: var(--tx); }
  [data-theme="retro"] .seg button.on { color: #0c180c; }
  .content { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
  .filters { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .filters-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filters-right { display: flex; align-items: center; gap: 8px; }
  .search-input { padding: 5px 12px; border: 1px solid var(--brd2); border-radius: var(--radius-sm); background: var(--surf2); color: var(--tx); font-size: 12px; font-family: var(--font); outline: none; width: 160px; }
  .search-input::placeholder { color: var(--mt); }
  .count { font-size: 11px; color: var(--mt); font-family: var(--mono); }
  .csv-btn { padding: 5px 14px; border: 1px solid var(--brd2); border-radius: var(--radius-sm); background: transparent; color: var(--mt); font-size: 11px; font-family: var(--font); cursor: pointer; }
  .csv-btn:hover { background: var(--surf2); color: var(--tx); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
  .list { display: flex; flex-direction: column; gap: 6px; }
  .watch-card { background: var(--surf); border: 1px solid var(--brd); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
  .watch-card:hover { border-color: var(--brd2); transform: translateY(-2px); }
  [data-theme="retro"] .watch-card:hover { border-color: var(--ac); box-shadow: 0 0 12px rgba(51,255,51,0.1); }
  .card-img { aspect-ratio: 1; background: var(--surf2); display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 14px; }
  .card-img img { width: 100%; height: 100%; object-fit: contain;}
  .card-img-ph { font-size: 36px; color: var(--mt); opacity: 0.4; }
  .card-body { padding: 10px 12px; }
  .card-name { font-size: 12px; font-weight: 500; color: var(--tx); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-ref { font-size: 10px; color: var(--mt); font-family: var(--mono); margin-bottom: 6px; }
  .card-badges { display: flex; flex-wrap: wrap; gap: 3px; }
  .list-row { display: flex; align-items: center; gap: 14px; padding: 10px 14px; background: var(--surf); border: 1px solid var(--brd); border-radius: var(--radius-sm); cursor: pointer; transition: border-color 0.15s; }
  .list-row:hover { border-color: var(--brd2); }
  [data-theme="retro"] .list-row:hover { border-color: var(--ac); }
  .list-thumb { width: 48px; height: 48px; border-radius: var(--radius-sm); background: var(--surf2); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; padding: 4px; }
  .list-thumb img { width: 100%; height: 100%; object-fit: contain;}
  .list-thumb-ph { font-size: 20px; color: var(--mt); opacity: 0.4; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 13px; font-weight: 500; color: var(--tx); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-ref { font-size: 10px; color: var(--mt); font-family: var(--mono); }
  .list-right { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; white-space: nowrap; }
  .badge-seri { background: var(--ac-light); color: var(--mt); }
  .badge-solar { background: var(--solar-bg); color: var(--solar); }
  .badge-bt { background: var(--bt-bg); color: var(--bt); }
  [data-theme="retro"] .badge-seri, [data-theme="retro"] .badge-solar, [data-theme="retro"] .badge-bt { background: var(--ac-light); color: var(--ac); border: 1px solid var(--brd2); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surf); border: 1px solid var(--brd2); border-radius: var(--radius); width: 100%; max-width: 90vw; overflow: hidden; animation: slideUp 0.2s ease; max-height: 90vh; overflow-y: auto; }
  [data-theme="retro"] .modal { border-color: var(--ac); box-shadow: 0 0 30px rgba(51,255,51,0.1); }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-img { width: 100%; aspect-ratio: 2; background: var(--surf2); display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-img img { max-height: 100%; max-width: 55%; object-fit: contain; mix-blend-mode: multiply; }
  [data-theme="dark"] .modal-img, [data-theme="retro"] .modal-img { background: #ffffff; }
  [data-theme="dark"] .modal-img img, [data-theme="retro"] .modal-img img { mix-blend-mode: multiply; }
  .modal-img-ph { font-size: 52px; color: var(--mt); opacity: 0.3; }
  .modal-body { padding: 18px; }
  .modal-name { font-size: 17px; font-weight: 500; color: var(--tx); margin-bottom: 3px; }
  .modal-ref { font-size: 11px; color: var(--mt); font-family: var(--mono); margin-bottom: 10px; }
  .modal-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .detail-table td { padding: 7px 0; border-bottom: 1px solid var(--brd); vertical-align: top; }
  .detail-table tr:last-child td { border-bottom: none; }
  .detail-table td:first-child { color: var(--mt); width: 42%; }
  .detail-table td:last-child { color: var(--tx); font-weight: 500; text-align: right; }
  .feat-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 12px; }
  .feat-tag { font-size: 10px; padding: 3px 9px; border-radius: 20px; background: var(--ac-light); color: var(--mt); }
  [data-theme="retro"] .feat-tag { border: 1px solid var(--brd2); color: var(--ac); background: transparent; }
  .modal-close { width: 100%; padding: 12px; background: transparent; border: none; border-top: 1px solid var(--brd); color: var(--mt); font-size: 13px; font-family: var(--font); cursor: pointer; }
  .modal-close:hover { background: var(--surf2); color: var(--tx); }
  .loading { text-align: center; padding: 80px 20px; color: var(--mt); font-family: var(--mono); font-size: 12px; letter-spacing: 2px; }
  .empty { text-align: center; padding: 80px 20px; color: var(--mt); }
  .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.3; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--tx); margin-bottom: 6px; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--brd2); border-radius: 4px; }

  /* Dinamik sütunlar için modal extra alanlar */
  .extra-fields { margin-top: 8px; }
</style>
</head>
<body data-theme="dark">

<div class="topbar">
  <div class="logo">Casio ◆ Collection</div>
  <div class="topbar-right">
    <div class="seg" id="themeCtrl">
      <button onclick="setTheme('light')">light</button>
      <button class="on" onclick="setTheme('dark')">dark</button>
      <button onclick="setTheme('retro')">retro</button>
    </div>
    <div class="seg" id="viewCtrl">
      <button class="on" onclick="setView('grid')">grid</button>
      <button onclick="setView('list')">liste</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="filters">
    <div class="filters-left">
      <input class="search-input" id="searchInput" placeholder="ara..." oninput="applyFilters()">
      <div class="seg" id="seriCtrl"></div>
    </div>
    <div class="filters-right">
      <span class="count" id="countEl"></span>
      <button class="csv-btn" onclick="exportCSV()">CSV indir</button>
    </div>
  </div>
  <div id="watchList"><div class="loading">YÜKLENİYOR...</div></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
// CSV'deki özel sütunlar — bunlar ayrı alanda gösterilir
const CORE_COLS = ['modelAdi','referansNo','seri','mekanizma','kasaMalzeme','kadranRengi','kayisRengi','camTipi','tarih','ozellikler','fotografUrl'];
const HIDDEN_IN_MODAL = ['modelAdi','referansNo','fotografUrl','ozellikler'];
const COL_LABELS = {
  seri: 'Seri', mekanizma: 'Mekanizma', kasaMalzeme: 'Kasa',
  kadranRengi: 'Kadran', kayisRengi: 'Kayış', camTipi: 'Cam', tarih: 'Satın alma'
};

let allWatches = [], filtered = [], headers = [], view = 'grid', activeSeri = '';

// CSV parser — virgül ve tırnak işaretlerini doğru handle eder
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const hdrs = lines[0].split(',').map(h => h.trim());
  const watches = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseCSVLine(lines[i]);
    const obj = {};
    hdrs.forEach((h, idx) => { obj[h] = vals[idx] || ''; });
    obj._id = i;
    // Özellikler pipe ile ayrılmış
    if (obj.ozellikler) obj.ozellikler = obj.ozellikler.split('|').map(s => s.trim()).filter(Boolean);
    watches.push(obj);
  }
  return { hdrs, watches };
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

async function loadCSV() {
  try {
    const res = await fetch('data.csv?t=' + Date.now());
    const text = await res.text();
    const { hdrs, watches } = parseCSV(text);
    headers = hdrs;
    allWatches = watches;
    buildSeriFilter();
    applyFilters();
  } catch(e) {
    document.getElementById('watchList').innerHTML = `<div class="empty"><div class="empty-icon">⌚</div><div class="empty-title">data.csv yüklenemedi</div></div>`;
  }
}

function buildSeriFilter() {
  const seriler = ['', ...new Set(allWatches.map(w => w.seri).filter(Boolean))];
  const ctrl = document.getElementById('seriCtrl');
  ctrl.innerHTML = seriler.map(s => `<button ${!s?'class="on"':''} onclick="setSeri('${s}')">${s||'tümü'}</button>`).join('');
}

function setTheme(t) {
  document.body.setAttribute('data-theme', t);
  document.querySelectorAll('#themeCtrl button').forEach(b => b.classList.toggle('on', b.textContent === t));
  localStorage.setItem('casio-theme', t);
}
function setView(v) {
  view = v;
  document.querySelectorAll('#viewCtrl button').forEach(b => b.classList.toggle('on', b.textContent === (v==='grid'?'grid':'liste')));
  render();
}
function setSeri(s) {
  activeSeri = s;
  document.querySelectorAll('#seriCtrl button').forEach(b => b.classList.toggle('on', b.textContent === (s||'tümü')));
  applyFilters();
}
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = allWatches.filter(w => {
    const matchSeri = !activeSeri || w.seri === activeSeri;
    const matchQ = !q || (w.modelAdi||'').toLowerCase().includes(q) || (w.referansNo||'').toLowerCase().includes(q);
    return matchSeri && matchQ;
  });
  document.getElementById('countEl').textContent = filtered.length + ' saat';
  render();
}

function badgesFor(w) {
  let h = `<span class="badge badge-seri">${w.seri||''}</span>`;
  if (w.mekanizma === 'Tough Solar') h += `<span class="badge badge-solar">Tough Solar</span>`;
  if (Array.isArray(w.ozellikler) && w.ozellikler.includes('Bluetooth')) h += `<span class="badge badge-bt">Bluetooth</span>`;
  return h;
}

function imgEl(w, boxCls, phCls) {
  if (!w.fotografUrl) return `<div class="${boxCls}"><span class="${phCls}">⌚</span></div>`;
  return `<div class="${boxCls}"><img src="${w.fotografUrl}" onerror="this.parentElement.innerHTML='<span class=${phCls}>⌚</span>'"></div>`;
}

function render() {
  const el = document.getElementById('watchList');
  if (!filtered.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">⌚</div><div class="empty-title">Sonuç bulunamadı</div></div>`; return; }
  if (view === 'grid') {
    el.innerHTML = `<div class="grid">${filtered.map(w => `
      <div class="watch-card" onclick="openModal(${w._id})">
        ${imgEl(w,'card-img','card-img-ph')}
        <div class="card-body">
          <div class="card-name">${w.modelAdi||''}</div>
          <div class="card-ref">${w.referansNo||''}</div>
          <div class="card-badges">${badgesFor(w)}</div>
        </div>
      </div>`).join('')}</div>`;
  } else {
    el.innerHTML = `<div class="list">${filtered.map(w => `
      <div class="list-row" onclick="openModal(${w._id})">
        ${imgEl(w,'list-thumb','list-thumb-ph')}
        <div class="list-info">
          <div class="list-name">${w.modelAdi||''}</div>
          <div class="list-ref">${w.referansNo||''}</div>
        </div>
        <div class="list-right">${badgesFor(w)}</div>
      </div>`).join('')}</div>`;
  }
}

function openModal(id) {
  const w = allWatches.find(x => x._id === id); if (!w) return;

  // Sabit alanlar
  const coreRows = Object.entries(COL_LABELS)
    .filter(([k]) => w[k])
    .map(([k, label]) => `<tr><td>${label}</td><td>${w[k]}</td></tr>`).join('');

  // CSV'de sonradan eklenen ekstra sütunlar (CORE_COLS dışındakiler)
  const extraRows = headers
    .filter(h => !CORE_COLS.includes(h) && w[h])
    .map(h => `<tr><td>${h}</td><td>${w[h]}</td></tr>`).join('');

  const imgBox = w.fotografUrl
    ? `<div class="modal-img"><img src="${w.fotografUrl}" onerror="this.parentElement.innerHTML='<span class=modal-img-ph>⌚</span>'"></div>`
    : `<div class="modal-img"><span class="modal-img-ph">⌚</span></div>`;

  const tags = Array.isArray(w.ozellikler) && w.ozellikler.length
    ? `<div class="feat-tags">${w.ozellikler.map(f=>`<span class="feat-tag">${f}</span>`).join('')}</div>` : '';

  document.getElementById('modalBox').innerHTML = `
    ${imgBox}
    <div class="modal-body">
      <div class="modal-name">${w.modelAdi||''}</div>
      <div class="modal-ref">${w.referansNo||''}</div>
      <div class="modal-badges">${badgesFor(w)}</div>
      <table class="detail-table">${coreRows}${extraRows}</table>
      ${tags}
    </div>
    <button class="modal-close" onclick="closeModal()">kapat</button>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function exportCSV() {
  const rows = [headers.join(',')];
  allWatches.forEach(w => {
    rows.push(headers.map(h => {
      const v = Array.isArray(w[h]) ? w[h].join(' | ') : (w[h]||'');
      return `"${String(v).replace(/"/g,'""')}"`;
    }).join(','));
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows.join('\n'));
  a.download = 'casio-koleksiyon.csv';
  a.click();
}

// Init
const savedTheme = localStorage.getItem('casio-theme') || 'dark';
setTheme(savedTheme);
loadCSV();
</script>
</body>
</html>
