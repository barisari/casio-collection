<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASIO Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f2f2;
    --surf: #ffffff;
    --surf2: #f2f2f2;
    --surf3: #e5e5ea;
    --tx: #1c1c1e;
    --tx2: #4a4a4e;
    --tx3: #6e6e73;
    --solar: #a63d00;
    --solar-bg: #fff2e5;
    --bt: #0058b8;
    --bt-bg: #e5f0fc;
    --brd: rgba(0,0,0,0.07);
    --brd2: rgba(0,0,0,0.12);
    --radius: 16px;
    --radius-sm: 12px;
    --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'DM Mono', 'SF Mono', monospace;
  }
  [data-theme="dark"] {
    --bg: #000000;
    --surf: #242424;
    --surf2: #1c1c1c;
    --surf3: #3a3a3c;
    --tx: #f5f5f7;
    --tx2: #aeaeb2;
    --tx3: #8e8e93;
    --solar: #ff9f0a;
    --solar-bg: #291800;
    --bt: #409cff;
    --bt-bg: #001e3c;
    --brd: rgba(255,255,255,0.07);
    --brd2: rgba(255,255,255,0.12);
  }
  [data-theme="retro"] {
    --bg: #080d08;
    --surf: #0d140d;
    --surf2: #111811;
    --surf3: #182018;
    --tx: #33ff33;
    --tx2: #26bf26;
    --tx3: #1a941a;
    --solar: #33ff33;
    --solar-bg: rgba(51,255,51,0.07);
    --bt: #33ff33;
    --bt-bg: rgba(51,255,51,0.07);
    --brd: rgba(51,255,51,0.09);
    --brd2: rgba(51,255,51,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--tx);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    transition: background 0.25s, color 0.25s;
  }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    background: rgba(242,242,242,0.88);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 0.5px solid var(--brd2);
    transition: background 0.25s;
  }
  [data-theme="dark"] .topbar { background: rgba(0,0,0,0.82); }
  [data-theme="retro"] .topbar { background: rgba(8,13,8,0.92); }

  .logo {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: var(--tx);
    text-transform: uppercase;
    user-select: none;
  }
  [data-theme="retro"] .logo { text-shadow: 0 0 16px rgba(51,255,51,0.45); }

  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .seg {
    display: flex;
    background: var(--surf2);
    border: 0.5px solid var(--brd2);
    border-radius: 22px;
    padding: 3px;
    gap: 1px;
  }
  .seg button {
    padding: 4px 13px;
    border: none; border-radius: 18px;
    background: transparent;
    color: var(--tx2);
    font-size: 11px; font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    display: flex; align-items: center; justify-content: center;
  }
  .seg button svg { display: block; }
  .seg button:has(svg) { padding: 4px 10px; }
  .seg button.on {
    background: var(--tx);
    color: var(--bg);
    box-shadow: none;
  }
  [data-theme="dark"] .seg button.on { box-shadow: none; }
  .seg button:hover:not(.on) { color: var(--tx); }

  /* ── PAGE HEADER ── */
  .page-header {
    max-width: 1920px;
    margin: 0 auto;
    padding: 44px 32px 0;
  }
  .page-title {
    font-size: clamp(28px, 3.5vw, 40px);
    font-weight: 600;
    color: var(--tx);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    max-width: 1920px;
    margin: 0 auto 28px;
    padding: 20px 32px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 0.5px solid var(--brd2);
  }
  .filter-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .filter-right { display: flex; align-items: center; gap: 8px; }

  .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .ftab {
    padding: 6px 16px;
    border: 0.5px solid var(--brd2);
    border-radius: 22px;
    background: transparent;
    color: var(--tx2);
    font-size: 12px; font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .ftab.on { background: var(--tx); color: var(--bg); border-color: var(--tx); }
  .ftab:hover:not(.on) { background: var(--surf2); color: var(--tx); }

  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-ico {
    position: absolute; left: 10px;
    width: 13px; height: 13px; color: var(--tx3);
    pointer-events: none; flex-shrink: 0;
  }
  .search-input {
    padding: 6px 12px 6px 28px;
    border: 0.5px solid var(--brd2);
    border-radius: 22px;
    background: var(--surf);
    color: var(--tx);
    font-size: 12px; font-family: var(--font);
    outline: none; width: 170px;
    transition: border-color 0.18s, width 0.25s ease;
  }
  .search-input:focus { border-color: var(--tx3); width: 210px; }
  .search-input::placeholder { color: var(--tx3); }

  .count-lbl {
    font-size: 11px; color: var(--tx3);
    font-family: var(--font);
    white-space: nowrap;
  }
  .sort-select {
    padding: 6px 28px 6px 12px;
    border: 0.5px solid var(--brd2); border-radius: 22px;
    background: var(--surf); color: var(--tx2);
    font-size: 11px; font-family: var(--font);
    cursor: pointer; outline: none;
    transition: all 0.18s;
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238e8e93' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }
  .sort-select:hover { color: var(--tx); border-color: var(--tx3); }

  .icon-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px;
    background: transparent; border: none;
    color: var(--tx3); cursor: pointer;
    transition: color 0.15s;
  }
  .icon-btn:hover { color: var(--tx); }
  .icon-btn.on { color: var(--tx); }
  .export-btn {
    border: 0.5px solid var(--brd2);
    border-radius: var(--radius-sm);
    width: 32px; height: 32px;
  }
  .export-btn:hover { background: var(--surf2); color: var(--tx); }

  .csv-btn {
    padding: 6px 14px;
    border: 0.5px solid var(--brd2); border-radius: 22px;
    background: transparent; color: var(--tx2);
    font-size: 11px; font-family: var(--font);
    cursor: pointer; transition: all 0.18s;
  }
  .csv-btn:hover { background: var(--surf2); color: var(--tx); }

  /* ── COLLECTION ── */
  .collection {
    max-width: 1920px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  /* Grid */
  .watch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  /* Full-bleed card */
  .watch-card {
    background: var(--surf2);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    aspect-ratio: 2/3;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.04);
  }
  [data-theme="dark"] .watch-card {
    box-shadow: 0 1px 4px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.2);
  }
  .watch-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.06);
  }
  [data-theme="dark"] .watch-card:hover {
    box-shadow: 0 8px 40px rgba(0,0,0,0.65);
  }
  [data-theme="retro"] .watch-card:hover {
    box-shadow: 0 0 28px rgba(51,255,51,0.18);
  }

  /* Image fills entire card */
  .card-img-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .card-img-wrap img {
    width: auto;
    height: 70%;
    object-fit: cover;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .watch-card:hover .card-img-wrap img { transform: scale(1.06); }
  .watch-ph { display:flex; align-items:center; justify-content:center; opacity:0.15; color:var(--tx); width:100%; height:100%; }
  .watch-ph svg { width:100%; height:auto; }
  .card-img-wrap .watch-ph { position:absolute; inset:0; }
  .list-thumb .watch-ph svg { transform:scale(1.75); }
  .card-img-ph, .list-ph, .modal-img-ph { display:none; }

  /* Top overlay: name + ref */
  .card-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 16px 16px 40px;
    z-index: 2;
  }
  .card-name {
    font-size: 15px; font-weight: 600;
    color: #ffffff;
    word-wrap: break-word;
    margin-bottom: 2px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .card-ref {
    font-size: 10px; color: rgba(255,255,255,0.4);
    font-family: var(--font);
  }

  /* Bottom overlay: badges */
  .card-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 40px 14px 14px;
    z-index: 2;
    display: flex; gap: 4px; flex-wrap: wrap;
  }
  .card-bottom .badge {
    background: rgba(255,255,255,0.15);
    color: #ffffff;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 0.5px solid rgba(255,255,255,0.22);
  }

  /* Light mode card overrides */
  body:not([data-theme="dark"]):not([data-theme="retro"]) .card-name { color: #1c1c1e; text-shadow: none; }
  body:not([data-theme="dark"]):not([data-theme="retro"]) .card-ref { color: #4a4a4e; }
  body:not([data-theme="dark"]):not([data-theme="retro"]) .card-bottom .badge {
    background: rgba(0,0,0,0.08);
    color: #1c1c1e;
    backdrop-filter: none; -webkit-backdrop-filter: none;
    border: 0.5px solid rgba(0,0,0,0.12);
  }

  /* Retro mode card overrides */
  [data-theme="retro"] .card-name { color: #33ff33; text-shadow: none; }
  [data-theme="retro"] .card-ref { color: #26bf26; }
  [data-theme="retro"] .card-bottom .badge {
    background: rgba(51,255,51,0.08);
    color: #33ff33;
    backdrop-filter: none; -webkit-backdrop-filter: none;
    border: 0.5px solid rgba(51,255,51,0.18);
  }

  /* List view */
  .watch-list {
    border-radius: var(--radius);
    overflow: visible;
    border: 0.5px solid var(--brd2);
    background: var(--surf);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  [data-theme="dark"] .watch-list { box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

  .list-header {
    display: grid;
    grid-template-columns: 120px 220px 160px 160px 200px 1fr;
    border-bottom: 0.5px solid var(--brd2);
    border-radius: var(--radius) var(--radius) 0 0;
    position: sticky;
    top: 48px;
    z-index: 10;
    background: var(--surf3);
    overflow: hidden;
    transition: border-radius 0.2s;
  }
  .list-header.is-stuck {
    border-radius: 0;
  }
  .list-header-cell {
    padding: 10px 20px;
    font-size: 10px; font-weight: 600;
    color: var(--tx2); text-transform: uppercase;
    letter-spacing: 0.07em;
    border-right: 0.5px solid var(--brd2);
  }
  .list-header-cell:first-child { border-right: none; }
  .list-header-cell:last-child { border-right: none; }

  .list-row {
    display: grid;
    grid-template-columns: 120px 220px 160px 160px 200px 1fr;
    align-items: stretch;
    cursor: pointer;
    border-bottom: 0.5px solid var(--brd);
    transition: background 0.15s;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: var(--surf2); }

  .list-thumb {
    min-height: 120px;
    background: var(--surf2);
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
    transition: background 0.15s;
  }
  .list-row:hover .list-thumb { background: var(--surf3); }
  .list-thumb img { width: 100%; height: 100%; object-fit: contain; }
  .list-ph { font-size: 28px; color: var(--tx3); opacity: 0.25; }

  .list-cell {
    padding: 0 20px;
    display: flex; flex-direction: column; justify-content: center;
    border-left: 0.5px solid var(--brd);
    overflow: hidden;
  }
  .list-name {
    font-size: 14px; font-weight: 600; color: var(--tx);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .list-ref { font-size: 11px; color: var(--tx3); margin-bottom: 0; }
  .list-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .list-spec-val {
    font-size: 13px; color: var(--tx); font-weight: 500;
  }
  .list-spec-sub {
    font-size: 11px; color: var(--tx3); margin-top: 2px;
  }
  .list-chevron {
    display: flex; align-items: center; justify-content: center;
    color: var(--tx3); font-size: 18px; font-weight: 300;
    border-left: 0.5px solid var(--brd);
  }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 9px; border-radius: 22px;
    font-size: 10px; font-weight: 500;
    white-space: nowrap;
  }
  .badge-seri { background: var(--surf2); color: var(--tx2); }
  .badge-solar { background: var(--solar-bg); color: var(--solar); }
  .badge-bt { background: var(--bt-bg); color: var(--bt); }
  .badge-icon { width: 24px; padding: 3px 0; justify-content: center; }
  [data-theme="retro"] .badge-seri,
  [data-theme="retro"] .badge-solar,
  [data-theme="retro"] .badge-bt {
    background: transparent; color: var(--tx);
    border: 0.5px solid var(--brd2);
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surf);
    border-radius: 24px;
    width: 90vw; max-width: 90vw;
    height: 90vh; max-height: 90vh;
    overflow: hidden;
    display: flex; flex-direction: column;
    animation: mIn 0.24s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 32px 80px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.1);
  }
  [data-theme="dark"] .modal { box-shadow: 0 32px 80px rgba(0,0,0,0.7); }
  [data-theme="retro"] .modal { border: 0.5px solid var(--brd2); box-shadow: 0 0 40px rgba(51,255,51,0.08); }
  @keyframes mIn {
    from { transform: scale(0.93) translateY(16px); opacity: 0; }
    to { transform: none; opacity: 1; }
  }

  .modal-scroll { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .modal-scroll::-webkit-scrollbar { width: 3px; }
  .modal-scroll::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 3px; }
  .modal-body { padding: 24px 28px 32px; flex-shrink: 0; overflow-y: auto; max-height: 45vh; transition: max-height 0.3s ease; }
  .modal.expanded .modal-body { max-height: 108px; overflow: hidden; cursor: zoom-out; }
  .modal-body .divider,
  .modal-body .feat-section,
  .modal-body .spec-section-title,
  .modal-body .spec-grid {
    overflow: hidden; max-height: 600px; opacity: 1;
    transition: max-height 0.3s ease, opacity 0.21s ease;
  }
  .modal.expanded .modal-body .divider,
  .modal.expanded .modal-body .feat-section,
  .modal.expanded .modal-body .spec-section-title,
  .modal.expanded .modal-body .spec-grid { max-height: 0; opacity: 0; }

  .modal-img-wrap {
    flex: 1;
    background: var(--surf2);
    display: flex; align-items: center; justify-content: center;
    padding: 28px; position: relative;
    min-height: 0;
    cursor: zoom-in;
    transition: flex 0.3s ease;
  }
  .modal-img-wrap img {
    max-height: 100%; max-width: 50%;
    object-fit: contain;
    transition: max-width 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .modal.expanded .modal-img-wrap { flex: 99; cursor: zoom-out; }
  .modal.expanded .modal-img-wrap img { max-width: 80%; }
  .modal-img-ph { font-size: 60px; color: var(--tx3); opacity: 0.2; animation: none; }

  .modal { position: relative; }
  .modal-x {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(120,120,128,0.35);
    border: none; color: var(--tx);
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; z-index: 100;
  }
  .modal-x:hover { background: rgba(120,120,128,0.55); }

  .modal-name {
    font-size: 24px; font-weight: 600;
    color: var(--tx); letter-spacing: -0.02em;
    margin-bottom: 3px;
  }
  .modal-ref { font-size: 11px; color: var(--tx3); font-family: var(--font); margin-bottom: 20px; }
  .modal-badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; margin-bottom: 0; padding-top: 4px; }

  .divider { height: 0.5px; background: var(--brd2); margin-bottom: 20px; }

  .spec-section-title {
    font-size: 10px; font-weight: 600;
    color: var(--tx3); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 12px;
  }
  .spec-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 0.5px solid var(--brd2);
    margin-bottom: 20px;
  }
  .spec-cell {
    padding: 11px 14px;
    border-bottom: 0.5px solid var(--brd);
    border-right: 0.5px solid var(--brd);
  }
  .spec-cell:nth-child(even) { border-right: none; }
  .spec-cell:nth-last-child(-n+2) { border-bottom: none; }
  .spec-label { font-size: 10px; color: var(--tx3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin-bottom: 2px; }
  .spec-val { font-size: 13px; color: var(--tx); font-weight: 500; }

  .feat-section { margin-top: 4px; margin-bottom: 24px; }
  .feat-title { font-size: 10px; font-weight: 600; color: var(--tx3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .feat-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .feat-tag {
    font-size: 11px; padding: 5px 12px;
    border-radius: 22px;
    background: var(--surf2); color: var(--tx2);
    border: 0.5px solid var(--brd2);
  }

  /* Loading / empty */
  .loading { text-align: center; padding: 100px 20px; color: var(--tx3); font-family: var(--font); font-size: 11px; letter-spacing: 0.1em; }
  .empty { text-align: center; padding: 100px 20px; }
  .empty-label { font-size: 18px; font-weight: 500; color: var(--tx2); margin-top: 12px; }

  /* Retro scanline */
  [data-theme="retro"] body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(51,255,51,0.012) 3px, rgba(51,255,51,0.012) 4px);
  }

  /* Responsive */
  @media (max-width: 640px) {
    .topbar { padding: 0 16px; }
    .page-header { padding: 32px 16px 0; }
    .filter-bar { padding: 16px 16px 18px; }
    .collection { padding: 0 16px 60px; }
    .watch-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .spec-grid { grid-template-columns: 1fr; }
    .modal-body { padding: 18px 20px 28px; }
    .list-header { grid-template-columns: 80px 1fr; }
    .list-row { grid-template-columns: 80px 1fr; }
    .list-cell:nth-child(n+3) { display: none; }

<script>
const CORE_COLS = ['modelAdi','referansNo','seri','mekanizma','kadran','camTipi','kasa','kayis','tarih','ozellikler','fotografUrl'];
const SPEC_LABELS = { seri:'Seri', mekanizma:'Mekanizma', kadran:'Kadran', camTipi:'Cam', kasa:'Kasa', kayis:'Kayış', tarih:'Satın alma' };

let allWatches = [], filtered = [], headers = [], view = 'grid', activeSeri = '';



function parseCSV(text) {
  const lines = text.trim().split('\n');
  const hdrs = lines[0].split(',').map(h => h.trim());
  const watches = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseCSVLine(lines[i]);
    const obj = {};
    hdrs.forEach((h, idx) => { obj[h] = vals[idx] || ''; });
    obj._id = i;
    if (obj.ozellikler) obj.ozellikler = obj.ozellikler.split('|').map(s => s.trim()).filter(Boolean);
    watches.push(obj);
  }
  return { hdrs, watches };
}

function parseCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

async function loadCSV() {
  try {
    const res = await fetch('data.csv?t=' + Date.now());
    if (!res.ok) throw new Error('CSV yüklenemedi');
    const text = await res.text();
    const { hdrs, watches } = parseCSV(text);
    headers = hdrs; allWatches = watches;
    buildSeriFilter(); applyFilters();
  } catch(e) {
    document.getElementById('watchList').innerHTML = `<div class="empty"><div class="empty-label">data.csv yüklenemedi</div></div>`;
  }
}

function buildSeriFilter() {
  const seriler = ['', ...new Set(allWatches.map(w => anaSeri(w.seri)).filter(Boolean))];
  document.getElementById('seriCtrl').innerHTML = seriler.map(s =>
    `<button class="ftab ${!s?'on':''}" onclick="setSeri('${s}')">${s||'tümü'}</button>`
  ).join('');
}

function setTheme(t) {
  document.body.setAttribute('data-theme', t);
  document.querySelectorAll('#themeCtrl button').forEach(b => b.classList.toggle('on', b.textContent === t));
  localStorage.setItem('casio-theme', t);
}
function setView(v) {
  view = v;
  document.querySelectorAll('#viewCtrl button').forEach((b, i) => {
    b.classList.toggle('on', (v === 'grid' && i === 0) || (v === 'list' && i === 1));
  });
  render();
}
function setSeri(s) {
  activeSeri = s;
  document.querySelectorAll('.ftab').forEach(b => b.classList.toggle('on', b.textContent === (s||'tümü')));
  applyFilters();
}
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortCtrl').value;
  filtered = allWatches.filter(w => {
    const ms = !activeSeri || anaSeri(w.seri) === activeSeri;
    const mq = !q || (w.modelAdi||'').toLowerCase().includes(q) || (w.referansNo||'').toLowerCase().includes(q);
    return ms && mq;
  });

  if (sort === 'date-desc') {
    filtered.sort((a,b) => parseTarih(b.tarih) - parseTarih(a.tarih));
  } else if (sort === 'date-asc') {
    filtered.sort((a,b) => parseTarih(a.tarih) - parseTarih(b.tarih));
  } else if (sort === 'model') {
    filtered.sort((a,b) => (a.modelAdi||'').localeCompare(b.modelAdi||'', 'tr'));
  } else if (sort === 'seri') {
    filtered.sort((a,b) => (a.seri||'').localeCompare(b.seri||'', 'tr'));
  } else if (sort === 'mekanizma') {
    filtered.sort((a,b) => (a.mekanizma||'').localeCompare(b.mekanizma||'', 'tr'));
  }

  document.getElementById('countEl').textContent = filtered.length + ' saat';
  render();
}

const TR_MONTHS = {
  'Ocak':1,'Şubat':2,'Mart':3,'Nisan':4,'Mayıs':5,'Haziran':6,
  'Temmuz':7,'Ağustos':8,'Eylül':9,'Ekim':10,'Kasım':11,'Aralık':12
};
function parseTarih(t) {
  if (!t) return 0;
  const [g, ay, y] = t.trim().split(' ');
  return new Date(+y, (TR_MONTHS[ay]||1)-1, +g).getTime();
}

function listFeatures(w) {
  if (!Array.isArray(w.ozellikler) || !w.ozellikler.length) return '<span style="color:var(--tx3)">—</span>';
  return w.ozellikler.map((f, i) => {
    const comma = i < w.ozellikler.length - 1 ? ',' : '';
    return `<span style="display:inline-block;font-size:12px;color:var(--tx2);line-height:1.8;white-space:nowrap;">${f}${comma}</span>`;
  }).join(' ');
}

function showWatchPH(el) { el.parentElement.innerHTML = WATCH_PH; }

const SOLAR_ICON = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" fill="currentColor"/><line x1="8" y1="1" x2="8" y2="3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="12.5" x2="8" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="1" y1="8" x2="3.5" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12.5" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3.05" y1="3.05" x2="4.81" y2="4.81" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="11.19" y1="11.19" x2="12.95" y2="12.95" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12.95" y1="3.05" x2="11.19" y2="4.81" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="4.81" y1="11.19" x2="3.05" y2="12.95" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const BT_ICON = `<svg width="9" height="12" viewBox="0 0 11 14" fill="none"><path d="M2 3.5L9 9.5L5.5 13V1L9 4.5L2 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function badges(w, short) {
  const [anaS, subS] = (w.seri||'').split(' - ');
  let h = `<span class="badge badge-seri">${anaS}</span>`;
  if (subS) h += `<span class="badge badge-seri">${subS}</span>`;
  if ((w.mekanizma||'').includes('Solar')) h += `<span class="badge badge-icon badge-solar">${SOLAR_ICON}</span>`;
  if (Array.isArray(w.ozellikler) && w.ozellikler.includes('Bluetooth')) h += `<span class="badge badge-icon badge-bt">${BT_ICON}</span>`;
  return h;
}

function anaSeri(s) { return (s||'').split(' - ')[0]; }

function render() {
  const el = document.getElementById('watchList');
  if (!filtered.length) { el.innerHTML = `<div class="empty"><div class="empty-label">Sonuç bulunamadı</div></div>`; return; }

  if (view === 'grid') {
    el.innerHTML = `<div class="watch-grid">${filtered.map(w => `
      <div class="watch-card" onclick="openModal(${w._id})">
        <div class="card-top">
          <div class="card-name">${w.modelAdi||''}</div>
          <div class="card-ref">${w.referansNo||''}</div>
        </div>
        <div class="card-img-wrap">
          ${w.fotografUrl ? `<img src="${w.fotografUrl}" onerror="showWatchPH(this)">` : WATCH_PH}
        </div>
        <div class="card-bottom">${badges(w, true)}</div>
      </div>`).join('')}</div>`;
  } else {
    el.innerHTML = `<div class="watch-list">
      <div class="list-header">
        <div class="list-header-cell"></div>
        <div class="list-header-cell">Model</div>
        <div class="list-header-cell">Seri</div>
        <div class="list-header-cell">Mekanizma</div>
        <div class="list-header-cell">Kasa / Cam</div>
        <div class="list-header-cell">Özellikler</div>
      </div>
      ${filtered.map(w => `
      <div class="list-row" onclick="openModal(${w._id})">
        <div class="list-thumb">
          ${w.fotografUrl ? `<img src="${w.fotografUrl}" onerror="showWatchPH(this)">` : WATCH_PH}
        </div>
        <div class="list-cell">
          <div class="list-name">${w.modelAdi||''}</div>
          <div class="list-ref">${w.referansNo||''}</div>
        </div>
        <div class="list-cell">
          <div class="list-badges">${badges(w, false)}</div>
        </div>
        <div class="list-cell">
          <div class="list-spec-val">${w.mekanizma||'—'}</div>
        </div>
        <div class="list-cell">
          <div class="list-spec-val">${w.kasa||'—'}</div>
          <div class="list-spec-sub">${w.camTipi ? w.camTipi + ' Cam' : ''}</div>
        </div>
        <div class="list-cell">
          <div class="list-badges">${listFeatures(w)}</div>
        </div>
      </div>`).join('')}
    </div>`;
  }
}

function openModal(id) {
  const w = allWatches.find(x => x._id === id); if (!w) return;
  const specEntries = Object.entries(SPEC_LABELS).filter(([k]) => w[k]);
  const extraCols = headers.filter(h => !CORE_COLS.includes(h) && w[h]);

  const specsHTML = specEntries.map(([k, lbl]) =>
    `<div class="spec-cell"><div class="spec-label">${lbl}</div><div class="spec-val">${w[k]}</div></div>`
  ).join('');

  const extraHTML = extraCols.length ? extraCols.map(h =>
    `<div class="spec-cell"><div class="spec-label">${h}</div><div class="spec-val">${w[h]}</div></div>`
  ).join('') : '';

  const tagsHTML = Array.isArray(w.ozellikler) && w.ozellikler.length ? `
    <div class="feat-section">
      <div class="feat-title">Özellikler</div>
      <div class="feat-tags">${w.ozellikler.map(f => `<span class="feat-tag">${f}</span>`).join('')}</div>
    </div>` : '';

  document.getElementById('modalBox').innerHTML = `
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div class="modal-img-wrap" onclick="toggleModalExpand()">
      ${w.fotografUrl ? `<img src="${w.fotografUrl}" onerror="showWatchPH(this)">` : WATCH_PH}
    </div>
    <div class="modal-body" onclick="if(document.getElementById('modalBox').classList.contains('expanded'))toggleModalExpand()">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px;">
        <div class="modal-name">${w.modelAdi||''}</div>
        <div class="modal-badges">${badges(w, false)}</div>
      </div>
      <div class="modal-ref">${w.referansNo||''}</div>
      <div class="divider"></div>
      ${tagsHTML}
      <div class="spec-section-title">Teknik Özellikler</div>
      <div class="spec-grid">${specsHTML}${extraHTML}</div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function toggleModalExpand() {
  document.getElementById('modalBox').classList.toggle('expanded');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalBox').classList.remove('expanded');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

window.addEventListener('scroll', () => {
  const header = document.querySelector('.list-header');
  if (!header) return;
  const stuck = header.getBoundingClientRect().top <= 48;
  header.classList.toggle('is-stuck', stuck);
});

function exportCSV() {
  const rows = [headers.join(',')];
  allWatches.forEach(w => {
    rows.push(headers.map(h => {
      const v = Array.isArray(w[h]) ? w[h].join(' | ') : (w[h]||'');
      return `"${String(v).replace(/"/g,'""')}"`;
    }).join(','));
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows.join('\n'));
  a.download = 'casio-koleksiyon.csv';
  a.click();
}

const t = localStorage.getItem('casio-theme') || 'dark';
setTheme(t);
loadCSV();
</script>
